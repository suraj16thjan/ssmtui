name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          URL="https://github.com/suraj16thjan/ssmtui/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/ssmtui.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/ssmtui.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ssmtui.rb
          git commit -m "Update Homebrew formula to ${{ github.event.release.tag_name }}"
          git push
